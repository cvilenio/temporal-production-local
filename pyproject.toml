[project]
name = "temporal-demo"
version = "0.0.0"
requires-python = ">=3.12,<3.13"
dependencies = []

[dependency-groups]
orders-service = [
    "asyncpg>=0.29.0",
    "dependency-injector>=4.49",
    "fastapi==0.111.0",
    "httpx>=0.27.0",
    "opentelemetry-api>=1.25",
    "opentelemetry-exporter-otlp-proto-grpc>=1.25",
    "opentelemetry-sdk>=1.25",
    "pydantic-settings>=2.14.0",
    "pydantic==2.7.1",
    "sqlalchemy[asyncio]>=2.0.30,<3",
    "temporalio>=1.28,<1.29",
    "uvicorn==0.29.0",
]
retail-demo-console = [
  "asyncpg>=0.29.0",
  "docker>=7.1.0",
  "fastapi>=0.111.0",
  "httpx>=0.27.0",
  "jinja2>=3.1.4",
  "pydantic-settings>=2.2.1",
  "uvicorn[standard]>=0.29.0",
]
mock-api = [
  "fastapi==0.111.0",
  "uvicorn==0.29.0",
  "pydantic==2.7.1",
]
dev = [
    "ruff",
    "pytest",
    "pytest-asyncio",
    "pyright>=1.1.410",
    "pytest-timeout>=2.4.0",
    "poethepoet>=0.46.0",
]

[tool.uv]
default-groups = ["orders-service", "retail-demo-console", "mock-api", "dev"]

# Task runner. Invoke with `uv run poe <task>` (e.g. `uv run poe check`).
[tool.poe.tasks]
ruff-check = { cmd = "ruff check .", help = "Lint with ruff" }
fix = { cmd = "ruff check --fix .", help = "Lint and autofix with ruff" }
format = { cmd = "ruff format .", help = "Format code" }
format-check = { cmd = "ruff format --check .", help = "Check formatting only" }
typecheck = { cmd = "pyright", help = "Static type check" }
test = { cmd = "pytest", help = "Run tests" }
lint = { sequence = [
  "ruff-check",
  "format-check",
  "typecheck",
], help = "All static checks (no fixes)" }
check = { sequence = ["lint", "test"], help = "Full gate: lint + test" }

# Compose lifecycle (ported from the old Makefile).
up = { cmd = "docker compose up --build", help = "Build and start the stack" }
down = { cmd = "docker compose down -v", help = "Stop the stack and drop volumes" }
fresh = { sequence = ["down", "up"], help = "Recreate the stack from scratch" }

[tool.pyright]
# Start at "basic" so adoption on existing code is low-friction; ratchet to
# "standard" once the codebase is clean.
typeCheckingMode = "basic"
pythonVersion = "3.12"
include = ["orders-service", "retail-demo-console", "mock-api"]
exclude = ["**/.venv", "**/__pycache__", "archive"]
# Each service runs from its own directory, so imports resolve relative to that
# root (e.g. orders-service uses `from shared...`, console uses `from app...`).
executionEnvironments = [
  { root = "orders-service" },
  { root = "retail-demo-console" },
  { root = "mock-api" },
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Stuck workflows/activities hang forever; fail fast instead.
timeout = 60
filterwarnings = [
  # Workflow that completes with a still-running update or signal handler is a
  # correctness bug. Turn these Temporal warnings into test failures.
  "error::temporalio.workflow.UnfinishedUpdateHandlersWarning",
  "error::temporalio.workflow.UnfinishedSignalHandlersWarning",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
# E/F = pyflakes + pycodestyle (defaults), I = import sorting,
# UP = pyupgrade (modern syntax), B = bugbear (likely-bug patterns)
select = ["E", "F", "I", "UP", "B"]
ignore = [
  # Line length is handled by the formatter; remaining hits are long
  # strings/comments/URLs we don't want to hand-wrap.
  "E501",
  # function-call-in-default-argument: FastAPI's Depends()/Query() idiom
  # is intentional, not a bug.
  "B008",
]
