# =============================================================================
# Ziggymart Retail Demo — Docker Compose (BASE, backend-agnostic)
# =============================================================================
#
# This file defines the application stack ONLY. It does NOT define a Temporal
# backend. The apps read their Temporal connection from env, defaulting to a
# local OSS server at temporal:7233 / namespace ziggymart:
#
#   TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE, TEMPORAL_TLS, TEMPORAL_API_KEY
#
# This base is the HOST VISIBILITY/CONSOLE PLANE: the console, observability, the
# external-dependency simulator (mock-api), pgweb, and the kind cluster observers.
# Compose's role is narrowed (RUNMODES.md): it runs this host plane for the kind
# paths, plus a LEGACY local OSS server + app tier. It does NOT run the Temporal
# workers — those run on kind (Worker Deployment). The app tier is a SEPARATE opt-in
# layer so the kind path doesn't duplicate what the cluster runs:
#   - the app tier (orders-db + orders-service) → compose/host-apptier.yml
# On the kind path the cluster runs the app tier AND the workers (orders-app +
# orders-workers charts), so the base alone is correct there; the console + pgweb
# reach the in-cluster app tier via the host ports kind maps
# (host.docker.internal:8002 / :5433 — see kind-config.yaml).
#
# Run modes (prefer the `poe` wrappers, which encode these):
#
#   kind + Cloud : base ONLY                                  (poe up-cloud-kind)
#                  (kind runs the workers AND the app tier; host runs visibility +
#                   console + pgweb + mock-api only. CONSOLE_BACKEND=cloud.)
#   Local OSS    : base + host-apptier.yml + oss-server.yml   (poe up)
#                  (oss-server.yml adds the local Temporal server + its deps and sets
#                   CONSOLE_BACKEND=oss. NO workers — workflows don't execute locally
#                   until OSS-on-kind lands; this is a server+app fallback.)
#
# Two injected descriptors drive the console (ADR-0015): CONSOLE_SUBSTRATE
# (compose|kind = where workloads run) and CONSOLE_BACKEND (cloud|oss = the Temporal
# backend). The same env contract carries to kind/Helm (a k8s Secret instead of an
# env-file) — see docs/RUNMODES.md.
#
#   lgtm (grafana/otel-lgtm) — OTel Collector + Prometheus + Tempo + Loki + Grafana
#   mock-api      — simulated external dependency ("the internet"), consumed by workers
#   platform-console — reaches orders-service + orders-db (compose names via the
#                      host-apptier overlay, or host.docker.internal on the kind path)
# =============================================================================

services:

  # ===========================================================================
  # OBSERVABILITY — LGTM STACK
  # OpenTelemetry Collector + Prometheus + Tempo + Loki + Grafana, all-in-one.
  #   Grafana UI: http://localhost:3000   OTLP: lgtm:4317/4318 (internal)
  # Prometheus inside lgtm also scrapes Temporal server + SDK metrics (when the
  # local OSS server is running) via the mounted prometheus.yaml.
  # ===========================================================================

  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
    networks:
      - temporal-network
    ports:
      - "3000:3000"   # Grafana UI
      # Published for the kind-side Grafana Alloy DaemonSet to ship logs OUT to
      # this host-side backend (the "observability is a separate, durable tier"
      # model — ADR-0018). Compose-network peers (mock-api, workers) reach the
      # collector as lgtm:4317 and don't need these host maps.
      - "3100:3100"   # Loki push (Alloy → loki/api/v1/push)
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./compose/observability/prometheus/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./compose/observability/grafana/provisioning/dashboards/ziggymart.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/ziggymart.yaml:ro
      - ./compose/observability/grafana/dashboards:/var/lib/grafana/dashboards/ziggymart:ro
      - ./compose/observability/grafana/provisioning/dashboards/critical.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/critical.yaml:ro
      - ./compose/observability/grafana/dashboards-critical:/var/lib/grafana/dashboards/critical:ro
      - lgtm-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s

  # NOTE: the app data store (orders-db) and the orders REST API (orders-service)
  # are NOT here — they live in compose/host-apptier.yml, an opt-in layer for the
  # Compose run modes. On the kind path the cluster runs them (orders-app chart),
  # and the console reaches them via host.docker.internal. See that file + RUNMODES.

  # ===========================================================================
  # APPLICATION — EXTERNAL SERVICE SIMULATOR
  # Simulates downstream APIs (inventory, shipping, payment). Port 8001 → 8000.
  # ===========================================================================

  mock-api:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: mock-api
        APP_PATH: apps/business/mock-api/python
        APP_MODULE: main:app
        APP_PORT: "8000"
    container_name: mock-api
    environment:
      - MOCK_SHIPPING_HANG_MS=15000
      - MOCK_INVENTORY_LATENCY_MS=2000
      - MOCK_SHIPPING_LATENCY_MS=1500
      - MOCK_PAYMENT_LATENCY_MS=2000
    networks:
      - temporal-network
    ports:
      - "8001:8000"

  # NOTE: the Temporal workers do NOT run in Compose. They run on kind (delivered
  # as a Worker Deployment via the orders-workers chart). On the legacy local-OSS
  # path the server + app tier come up without workers, so workflows don't execute
  # locally until OSS-on-kind lands. See docs/RUNMODES.md.

  # ===========================================================================
  # APPLICATION — DEMO CONSOLE
  # FastAPI + HTMX dashboard. Mounts the Docker socket (read-only) to stream
  # container logs. Port 8086.
  # ===========================================================================

  platform-console:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: platform-console
        APP_PATH: apps/platform/console/python
        APP_MODULE: app.main:app
        APP_PORT: "8086"
    container_name: platform-console
    # No app-tier depends_on here: on the kind path orders-db/orders-service run in
    # the cluster, not Compose. The host-apptier overlay re-adds the depends_on and
    # repoints these URLs at the in-compose names for the Compose run modes.
    environment:
      # Defaults target the KIND path: the app tier runs in-cluster and is reached
      # via the host ports kind maps (host.docker.internal:8002 / :5433). The
      # host-apptier overlay overrides both to the in-compose orders-db/orders-service.
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5433/orders_db
      - ORDERS_SERVICE_URL=http://host.docker.internal:8002
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Substrate selects the live-status source (ADR-0015 phase-2). Base defaults
      # to kind (cluster pods + host-plane tooling); the host-apptier overlay flips
      # it to compose for the pure-Compose run modes. KUBECONFIG points at the
      # read-only console kubeconfig cluster-up.sh mints into .secrets/kube.
      - CONSOLE_SUBSTRATE=${CONSOLE_SUBSTRATE:-kind}
      # Backend descriptor (ADR-0015): the base path is kind+Cloud, so default
      # `cloud` — the console owns a read-only Temporal Cloud liveness probe and
      # scopes Reset Demo State to local data only. compose/oss-server.yml flips it
      # to `oss` for the local self-hosted server.
      - CONSOLE_BACKEND=${CONSOLE_BACKEND:-cloud}
      - KUBECONFIG=/kube/kind.console.kubeconfig
      - PORT=8086
      - LOG_BUFFER_SIZE=500
      - MESSAGE_POLL_INTERVAL_SECONDS=3
      - ORDERS_SERVICE_TIMEOUT_SECONDS=60
      # Browser-reachable URLs for embedded tool UIs. The Temporal UI is only
      # present in local-OSS mode; compose/oss-server.yml sets it there.
      - TEMPORAL_UI_EMBED_URL=${TEMPORAL_UI_EMBED_URL:-}
      # Cloud mode (no local UI): the nav links out to the hosted Cloud console's
      # namespaces list (several namespaces are live at once). TEMPORAL_NAMESPACE
      # just signals "pointed at Cloud"; TEMPORAL_UI_EXTERNAL_URL can override the
      # target.
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-}
      - TEMPORAL_UI_EXTERNAL_URL=${TEMPORAL_UI_EXTERNAL_URL:-}
      # Cloud connection profile (sourced by `poe up-cloud-kind` from
      # .secrets/keys/cloud.env) — the console builds its OWN read-only client for
      # the Temporal Cloud liveness probe. Empty on the OSS path, so the probe stays
      # off there. The dedicated read-only observer key (TEMPORAL_CLOUD_OPS_API_KEY,
      # cloud Terraform layer) also powers the regions/namespaces inventory block.
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-}
      - TEMPORAL_TLS=${TEMPORAL_TLS:-}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      # Read-only account-level OBSERVER key (cloud Terraform layer output
      # observer_api_key_token). Lets the console call the Cloud Ops API
      # (GetNamespaces/GetRegions) for the multi-region/namespace status block.
      # Empty → that block is hidden; the single-namespace probe still works.
      - TEMPORAL_CLOUD_OPS_API_KEY=${TEMPORAL_CLOUD_OPS_API_KEY:-}
      - GRAFANA_EMBED_URL=http://localhost:3000
      - PGWEB_EMBED_URL=http://localhost:8083
      # Cluster-visibility UIs, fronted by viz-proxy (frame headers stripped).
      # Always wired; the panels are live only while the kind cluster is up
      # (Headlamp shows "unreachable", ArgoCD 502s) — see ADR-0014.
      - HEADLAMP_EMBED_URL=http://localhost:8087
      - ARGOCD_EMBED_URL=http://localhost:8088
    # Reach the kind-mapped host ports (orders-api/orders-db) on the kind path.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - temporal-network
    ports:
      - "8086:8086"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Read-only console kubeconfig (kind substrate) — same dir Headlamp mounts.
      # Present only after `just cluster-up`; the KubeProvider connects lazily and
      # degrades to "down" for cluster services until it appears.
      - ./.secrets/kube:/kube:ro
    # On the kind path the console may start before the in-cluster DB is reachable
    # (its asyncpg pool connects at boot); retry until the cluster app tier is up.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # APPLICATION — TEMPORAL CODEC SERVER  (scaffold)
  # Remote codec the Temporal UI/CLI call to decode encrypted Payloads.
  # Placeholder codec — replace with AEAD before real use. Port 8085 → 8000.
  # ===========================================================================

  codec-server:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: codec-server
        APP_PATH: apps/temporal/codec-server/python
        APP_MODULE: main:app
        APP_PORT: "8000"
    container_name: codec-server
    environment:
      - CODEC_UI_ORIGIN=http://localhost:8082
    networks:
      - temporal-network
    ports:
      - "8085:8000"

  # ===========================================================================
  # DEV ADMIN UI — pgweb for the orders DB → http://localhost:8083.
  # Host-plane in every mode. On the KIND path (base) it browses the in-cluster
  # CNPG orders-db through the host port kind maps (host.docker.internal:5433,
  # NodePort 30543 → owner admin/password, db orders_db). The host-apptier overlay
  # repoints DATABASE_URL at the in-compose orders-db for the Compose run modes.
  # ===========================================================================
  pgweb-orders:
    image: sosedoff/pgweb
    container_name: pgweb-orders
    environment:
      - DATABASE_URL=postgres://admin:password@host.docker.internal:5433/orders_db?sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - temporal-network
    ports:
      - "8083:8081"
    restart: unless-stopped

  # ===========================================================================
  # CLUSTER VISIBILITY  (host plane, non-prod — see ADR-0014)
  # Always-on observers into the kind cluster. They live on the host plane
  # (Compose), NOT in kind, so they survive `cluster-stop`/teardown and can
  # inspect a degraded cluster. Reachable through viz-proxy, which strips the
  # frame headers so the demo console can iframe them.
  # ===========================================================================

  # Headlamp — web K8s explorer (pods, live logs, exec, events). Reads the
  # CONTAINER-reachable kubeconfig that cluster-up.sh writes (host rewritten to
  # host.docker.internal, TLS verify skipped). Headlamp WATCHES the kubeconfig
  # and auto-loads the cluster within ~10s of it appearing — so bringing up kind
  # after this container needs no restart. (`just headlamp-reload` only forces an
  # immediate refresh.)
  headlamp:
    image: ghcr.io/headlamp-k8s/headlamp:latest
    container_name: headlamp
    environment:
      - KUBECONFIG=/kube/kind.incontainer.kubeconfig
    volumes:
      - ./.secrets/kube:/kube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - temporal-network
    restart: unless-stopped

  # viz-proxy — frame-header-stripping reverse proxy for the visibility UIs.
  # 8087 → Headlamp (by service name); 8088 → ArgoCD (kind NodePort via
  # host.docker.internal:8090). Separate from the OSS-only Temporal ui-proxy
  # because these must work in every kind run mode (incl. kind + Cloud).
  viz-proxy:
    image: nginx:alpine
    container_name: viz-proxy
    depends_on:
      - headlamp
    ports:
      - "8087:8087"   # Headlamp
      - "8088:8088"   # ArgoCD UI
    volumes:
      - ./compose/deployment/nginx/viz-proxy.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - temporal-network
    restart: unless-stopped

# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================

networks:
  temporal-network:
    driver: bridge
    name: temporal-network

volumes:
  # orders-db-data lives in compose/host-apptier.yml (with the orders-db service).
  lgtm-data:
