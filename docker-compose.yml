# =============================================================================
# Ziggymart Retail Demo — Docker Compose (BASE, backend-agnostic)
# =============================================================================
#
# This file defines the application stack ONLY. It does NOT define a Temporal
# backend. The apps read their Temporal connection from env, defaulting to a
# local OSS server at temporal:7233 / namespace ziggymart:
#
#   TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE, TEMPORAL_TLS, TEMPORAL_API_KEY
#
# Run modes (prefer the `poe` wrappers, which encode these):
#
#   Local OSS  : docker compose -f docker-compose.yml -f compose/oss-server.yml up
#                (compose/oss-server.yml adds the Temporal server + its deps)
#   Temporal Cloud :
#                docker compose -f docker-compose.yml \
#                  --env-file .secrets/keys/cloud-nonprod.env up
#                (no local server; apps connect out to Cloud)
#
# The same env contract carries to kind/Helm later (k8s Secret instead of an
# env-file) — see docs/RUNMODES.md.
#
#   lgtm (grafana/otel-lgtm) — OTel Collector + Prometheus + Tempo + Loki + Grafana
#   orders-db ──► orders-service ──► orders-workflow-worker / orders-activity-worker
#              │         └─────────► retail-demo-console
#   mock-api ──┘ (consumed by workers)
#   pgweb-orders → orders-db   (dev admin UI)
# =============================================================================

services:

  # ===========================================================================
  # OBSERVABILITY — LGTM STACK
  # OpenTelemetry Collector + Prometheus + Tempo + Loki + Grafana, all-in-one.
  #   Grafana UI: http://localhost:3000   OTLP: lgtm:4317/4318 (internal)
  # Prometheus inside lgtm also scrapes Temporal server + SDK metrics (when the
  # local OSS server is running) via the mounted prometheus.yaml.
  # ===========================================================================

  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
    networks:
      - temporal-network
    ports:
      - "3000:3000"
    volumes:
      - ./compose/observability/prometheus/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./compose/observability/grafana/provisioning/dashboards/ziggymart.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/ziggymart.yaml:ro
      - ./compose/observability/grafana/dashboards:/var/lib/grafana/dashboards/ziggymart:ro
      - ./compose/observability/grafana/provisioning/dashboards/critical.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/critical.yaml:ro
      - ./compose/observability/grafana/dashboards-critical:/var/lib/grafana/dashboards/critical:ro
      - lgtm-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s

  # ===========================================================================
  # APPLICATION — DATA STORE
  # Postgres for the Ziggymart orders application (separate from any Temporal
  # cluster DB). Host port 5433.
  # ===========================================================================

  orders-db:
    image: postgres:16
    container_name: orders-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    networks:
      - temporal-network
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  # ===========================================================================
  # APPLICATION — EXTERNAL SERVICE SIMULATOR
  # Simulates downstream APIs (inventory, shipping, payment). Port 8001 → 8000.
  # ===========================================================================

  mock-api:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: mock-api
        APP_PATH: apps/demo/mock-api/python
        APP_MODULE: main:app
        APP_PORT: "8000"
    container_name: mock-api
    environment:
      - MOCK_SHIPPING_HANG_MS=15000
      - MOCK_INVENTORY_LATENCY_MS=2000
      - MOCK_SHIPPING_LATENCY_MS=1500
      - MOCK_PAYMENT_LATENCY_MS=2000
    networks:
      - temporal-network
    ports:
      - "8001:8000"

  # ===========================================================================
  # APPLICATION — ORDERS API SERVICE
  # FastAPI service exposing the orders REST API; starts/signals Temporal
  # workflows. Port 8002 → 8000. Temporal backend is selected via env.
  # ===========================================================================

  orders-service:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: orders-api
        APP_PATH: apps/business/orders-api/python
        APP_MODULE: main:app
        APP_PORT: "8000"
    container_name: orders-service
    depends_on:
      orders-db:
        condition: service_healthy
      lgtm:
        condition: service_healthy
    environment:
      # Temporal backend — defaults target the local OSS server; override via
      # --env-file (Cloud) or compose/oss-server.yml (local OSS).
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-ziggymart}
      - TEMPORAL_TLS=${TEMPORAL_TLS:-false}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://admin:password@orders-db:5432/orders_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_SERVICE_NAME=orders-service
      - SDK_METRICS_PORT=9000
    networks:
      - temporal-network
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  # ===========================================================================
  # APPLICATION — TEMPORAL WORKERS
  #   orders-workflow-worker  polls orders-workflow-task-queue → hosts OrderWorkflow
  #   orders-activity-worker  polls orders-activity-task-queue → hosts activities
  # Same image; the entrypoint dir selects the role. Temporal backend via env.
  # ===========================================================================

  orders-workflow-worker:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: workers
        APP_PATH: apps/temporal/workers/python/workflow
        APP_MODULE: main
        APP_CMD: python
    container_name: orders-workflow-worker
    command: ["python", "main.py"]
    depends_on:
      orders-db:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      mock-api:
        condition: service_started
      lgtm:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-ziggymart}
      - TEMPORAL_TLS=${TEMPORAL_TLS:-false}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://admin:password@orders-db:5432/orders_db
      - MOCK_API_URL=http://mock-api:8000
      - ORDERS_SERVICE_URL=http://orders-service:8000
      - PYTHONUNBUFFERED=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_SERVICE_NAME=orders-workflow-worker
      - SDK_METRICS_PORT=9000
    networks:
      - temporal-network

  orders-activity-worker:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: workers
        APP_PATH: apps/temporal/workers/python/activity
        APP_MODULE: main
        APP_CMD: python
    container_name: orders-activity-worker
    command: ["python", "main.py"]
    depends_on:
      orders-db:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      mock-api:
        condition: service_started
      lgtm:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-ziggymart}
      - TEMPORAL_TLS=${TEMPORAL_TLS:-false}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://admin:password@orders-db:5432/orders_db
      - MOCK_API_URL=http://mock-api:8000
      - ORDERS_SERVICE_URL=http://orders-service:8000
      - PYTHONUNBUFFERED=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_SERVICE_NAME=orders-activity-worker
      - SDK_METRICS_PORT=9000
    networks:
      - temporal-network

  # ===========================================================================
  # APPLICATION — DEMO CONSOLE
  # FastAPI + HTMX dashboard. Mounts the Docker socket (read-only) to stream
  # container logs. Port 8086.
  # ===========================================================================

  retail-demo-console:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: retail-demo-console
        APP_PATH: apps/demo/console/python
        APP_MODULE: app.main:app
        APP_PORT: "8086"
    container_name: retail-demo-console
    depends_on:
      orders-db:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://admin:password@orders-db:5432/orders_db
      - ORDERS_SERVICE_URL=http://orders-service:8000
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PORT=8086
      - LOG_BUFFER_SIZE=500
      - MESSAGE_POLL_INTERVAL_SECONDS=3
      - ORDERS_SERVICE_TIMEOUT_SECONDS=60
      # Browser-reachable URLs for embedded tool UIs. The Temporal UI is only
      # present in local-OSS mode; compose/oss-server.yml sets it there.
      - TEMPORAL_UI_EMBED_URL=${TEMPORAL_UI_EMBED_URL:-}
      # Cloud mode (no local UI): the nav links out to the hosted Cloud console's
      # namespaces list (several namespaces are live at once). TEMPORAL_NAMESPACE
      # just signals "pointed at Cloud"; TEMPORAL_UI_EXTERNAL_URL can override the
      # target.
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-}
      - TEMPORAL_UI_EXTERNAL_URL=${TEMPORAL_UI_EXTERNAL_URL:-}
      - GRAFANA_EMBED_URL=http://localhost:3000
      - PGWEB_EMBED_URL=http://localhost:8083
      # Cluster-visibility UIs, fronted by viz-proxy (frame headers stripped).
      # Always wired; the panels are live only while the kind cluster is up
      # (Headlamp shows "unreachable", ArgoCD 502s) — see ADR-0014.
      - HEADLAMP_EMBED_URL=http://localhost:8087
      - ARGOCD_EMBED_URL=http://localhost:8088
    networks:
      - temporal-network
    ports:
      - "8086:8086"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # APPLICATION — TEMPORAL CODEC SERVER  (scaffold)
  # Remote codec the Temporal UI/CLI call to decode encrypted Payloads.
  # Placeholder codec — replace with AEAD before real use. Port 8085 → 8000.
  # ===========================================================================

  codec-server:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: codec-server
        APP_PATH: apps/temporal/codec-server/python
        APP_MODULE: main:app
        APP_PORT: "8000"
    container_name: codec-server
    environment:
      - CODEC_UI_ORIGIN=http://localhost:8082
    networks:
      - temporal-network
    ports:
      - "8085:8000"

  # ===========================================================================
  # DEV ADMIN UI  (non-critical)
  # pgweb for the orders DB. The temporal-DB browser lives in oss-server.yml.
  # ===========================================================================

  pgweb-orders:   # orders-db browser  →  http://localhost:8083
    image: sosedoff/pgweb
    container_name: pgweb-orders
    depends_on:
      - orders-db
    environment:
      - DATABASE_URL=postgres://admin:password@orders-db:5432/orders_db?sslmode=disable
    networks:
      - temporal-network
    ports:
      - "8083:8081"
    restart: always

  # ===========================================================================
  # CLUSTER VISIBILITY  (host plane, non-prod — see ADR-0014)
  # Always-on observers into the kind cluster. They live on the host plane
  # (Compose), NOT in kind, so they survive `cluster-stop`/teardown and can
  # inspect a degraded cluster. Reachable through viz-proxy, which strips the
  # frame headers so the demo console can iframe them.
  # ===========================================================================

  # Headlamp — web K8s explorer (pods, live logs, exec, events). Reads the
  # CONTAINER-reachable kubeconfig that cluster-up.sh writes (host rewritten to
  # host.docker.internal, TLS verify skipped). Headlamp WATCHES the kubeconfig
  # and auto-loads the cluster within ~10s of it appearing — so bringing up kind
  # after this container needs no restart. (`just headlamp-reload` only forces an
  # immediate refresh.)
  headlamp:
    image: ghcr.io/headlamp-k8s/headlamp:latest
    container_name: headlamp
    environment:
      - KUBECONFIG=/kube/temporal-platform.incontainer.kubeconfig
    volumes:
      - ./.secrets/kube:/kube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - temporal-network
    restart: unless-stopped

  # viz-proxy — frame-header-stripping reverse proxy for the visibility UIs.
  # 8087 → Headlamp (by service name); 8088 → ArgoCD (kind NodePort via
  # host.docker.internal:8090). Separate from the OSS-only Temporal ui-proxy
  # because these must work in every kind run mode (incl. kind + Cloud).
  viz-proxy:
    image: nginx:alpine
    container_name: viz-proxy
    depends_on:
      - headlamp
    ports:
      - "8087:8087"   # Headlamp
      - "8088:8088"   # ArgoCD UI
    volumes:
      - ./compose/deployment/nginx/viz-proxy.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - temporal-network
    restart: unless-stopped

# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================

networks:
  temporal-network:
    driver: bridge
    name: temporal-network

volumes:
  orders-db-data:
  lgtm-data:
