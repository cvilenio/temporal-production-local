# orders-api — Temporal client + system of record. Account-bearing values (Cloud
# endpoint, namespace handle, client API-key Secret) are injected at deploy time
# by the cluster layer (Terraform → ArgoCD Application valuesObject); the
# placeholders below keep `helm template` + kubeconform runnable.

ordersApi:
  # Image in the local kind registry (localhost:5001), built+pushed by `just ci`;
  # the cluster layer pins the tag to the git SHA (prefers a digest) at apply time.
  image:
    repository: localhost:5001/orders-api
    tag: "latest"
    digest: ""
  replicas: 1
  port: 8000
  # NodePort exposing orders-api to the host (the still-on-host console's
  # ORDERS_SERVICE_URL + the E2E curl). kind maps it to a host port.
  hostNodePort: 30800
  # OTLP push endpoint for TRACES → lgtm/Tempo. gRPC, so MUST be 4317 (4318 is
  # OTLP/HTTP — a gRPC client there fails). lgtm publishes 4317 on the host
  # (docker-compose.yml), reached via the cluster host gateway. (Logs go
  # stdout→Alloy, not here.)
  otelEndpoint: "http://host.docker.internal:4317"
  # OTLP push endpoint for BUSINESS METRICS → standalone OTel Collector →
  # ClickHouse (ADR-0024). Distinct from traces so business metrics warehouse in
  # ClickHouse, not lgtm's bundled Prometheus. gRPC, host-published 4319.
  metricsOtelEndpoint: "http://host.docker.internal:4319"

# Data-converter ref from config/domains/*.yaml — injected at deploy time as
# TEMPORAL_DATA_CONVERTER (ADR-0026).
dataConverter: "default"

# Logging (obslog / ADR-0018). On Kubernetes the Grafana Alloy DaemonSet tails
# pod stdout, so orders-api logs JSON to stdout only (otlpPush=false).
logging:
  level: INFO
  format: json
  otlpPush: false
  serviceNamespace: ziggymart

# Temporal Cloud connection — authenticated as the DEDICATED client service
# account (ADR-0008), whose API key the cluster layer seeds as orders-client-apikey.
connection:
  hostPort: "regional-endpoint.example:7233"
  temporalNamespace: "ziggymart.<account-id>"
  tls: true
  # Exactly one credential is set by the cluster layer per backend: apiKeySecret
  # (Cloud) or mtlsSecret (OSS, a cert-manager kubernetes.io/tls Secret with
  # tls.crt/tls.key/ca.crt). The template branches on whichever is non-empty.
  apiKeySecret: orders-client-apikey
  apiKeySecretKey: api-key
  mtlsSecret: ""

# orders-db coordinates (the Cluster + credential live in the orders-data chart).
# Used to build DATABASE_URL and to reference the orders-data-created credential
# Secret. Must match orders-data's db.{clusterName,owner,database}.
db:
  clusterName: orders-db
  owner: admin
  database: orders_db
