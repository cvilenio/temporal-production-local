# Dedicated KSA for orders-api, token not mounted — orders-api talks to the
# Temporal frontend (Cloud) and its Postgres; it never calls the Kubernetes API.
# Same hardening as the worker KSAs (ADR-0008).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders-api
  labels:
    app.kubernetes.io/name: orders-api
    app.kubernetes.io/component: app
automountServiceAccountToken: false
