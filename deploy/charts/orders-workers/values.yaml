# Connection to the Temporal frontend.
#
# For kind+Cloud the account-bearing values (hostPort = regional endpoint,
# temporalNamespace = <ns>.<account>) are injected at deploy time by the cluster
# layer (Terraform reads them from cloud state into the ArgoCD Application's
# valuesObject) — they are NOT committed here (account id stays out of git;
# see .githooks/pre-commit). The placeholders below keep `helm template` runnable.
connection:
  # API keys REQUIRE the regional endpoint, e.g. us-east-1.aws.api.temporal.io:7233.
  # The namespace endpoint (<ns>.<acct>.tmprl.cloud:7233) rejects API keys.
  # Placeholder kept schema-valid (CRD pattern ^[a-zA-Z0-9.-]+:[0-9]+$) so
  # `helm template` + kubeconform pass; the cluster layer overrides it at apply.
  hostPort: "regional-endpoint.example:7233"
  temporalNamespace: "ziggymart-nonprod.<account-id>"
  tls: true
  # API-key auth (default for this repo's Cloud namespaces — api_key_auth=true).
  # apiKeySecret is the k8s Secret created by the cluster layer; key holds the token.
  apiKeySecret: orders-cloud-apikey
  apiKeySecretKey: api-key
  # mtlsSecret: orders-temporal-tls   # (alternative) mTLS Connection instead of API key

# Rollout strategy for every WorkerDeployment (see ADR-0004):
#   AllAtOnce   — controller promotes a healthy version to Current at 100%. The
#                 first version of a fresh deployment becomes Current immediately,
#                 so `platform-up` yields a routable cluster with no manual step.
#   Progressive — controller ramps by `steps:` (+ optional gate workflow); on a
#                 cold start the steps are skipped and v1 goes Current at once.
#                 (Requires adding a `steps:` block to the chart template.)
#   Manual      — versions register Inactive; a human runs `temporal worker
#                 deployment set-current-version` for EVERY version, including the
#                 first. A cold cluster then has no Current version and versioned
#                 workflows sit pending. Use only when you want to gate promotion
#                 by hand. NOTE: any manual set-current-version makes the controller
#                 back off (LastModifierIdentity ≠ controller); hand ownership back
#                 with metadata `temporal.io/ignore-last-modifier: true` or by
#                 deleting the Worker Deployment from the server and redeploying.
# Default AllAtOnce: this is a local/non-prod env where the happy path must just
# work; Progressive is the prod-grade upgrade when demoing safe canary rollouts.
rollout:
  strategy: AllAtOnce

# Keep drained versions alive long enough that rollback routes to a live worker.
sunset:
  scaledownDelay: 30m
  deleteDelay: 2h

# One entry per worker profile (mirrors orders.worker.WORKER_PROFILES and
# apps/temporal/workers/python/<name>/). Each profile is its own image (the entrypoint is
# baked at build time via APP_PATH), so each gets its own image tag = version.
# Images live in the local kind registry (localhost:5001), pushed by `just ci`;
# the cluster layer pins the tag to the freshly-built git SHA at apply time.
workers:
  - name: workflow
    deploymentName: orders-workflow
    replicas: 1
    image:
      repository: localhost:5001/orders-worker-workflow
      tag: "latest" # cluster layer overrides with the git-SHA tag from `just ci`
    command: ["python", "main.py"]
  - name: activity
    deploymentName: orders-activity
    replicas: 2
    image:
      repository: localhost:5001/orders-worker-activity
      tag: "latest"
    command: ["python", "main.py"]
