# Per-worker autoscaling via the custom temporal-worker-autoscaler controller
# (ADR-0023). One WorkerAutoscaler CR per worker; the controller discovers each
# worker's per-version Deployments (temporal.io/deployment-name label), reads
# fresh per-version backlog from Temporal Cloud, and patches replicas directly for
# seconds-level actuation. Replaces the former WorkerResourceTemplate → KEDA
# ScaledObject seam (which bottomed out on the HPA sync loop and tripped the Cloud
# per-API rate limit via per-version poll fan-out).
#
# Gated per worker: presence of workers[].autoscaling renders a CR; workers without
# it render nothing (host-OSS dev path, or fixed-replica workers).
{{- range .Values.workers }}
{{- if .autoscaling }}
{{- $a := .autoscaling }}
---
apiVersion: autoscaling.ziggymart.io/v1alpha1
kind: WorkerAutoscaler
metadata:
  name: {{ .deploymentName }}
  labels:
    app.kubernetes.io/name: {{ .deploymentName }}
    app.kubernetes.io/component: autoscaler
spec:
  # Matches the temporal.io/deployment-name label on the versioned Deployments.
  deploymentName: {{ .deploymentName | quote }}
  taskQueue: {{ .taskQueue | quote }}
  queueType: {{ .kind | quote }}
  minReplicas: {{ $a.minReplicas }}
  maxReplicas: {{ $a.maxReplicas }}
  {{- with $a.targetBacklogPerReplica }}
  targetBacklogPerReplica: {{ . | int }}
  {{- end }}
  {{- with $a.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $a.slotScaleUpEnabled }}
  slotScaleUpEnabled: true
  {{- end }}
  {{- if $a.slotScaleDownGateEnabled }}
  slotScaleDownGateEnabled: true
  {{- end }}
  {{- if $a.targetSlotUtilizationPercent }}
  targetSlotUtilizationPercent: {{ $a.targetSlotUtilizationPercent }}
  {{- end }}
  {{- if $a.scaleDownSlotUtilizationPercent }}
  scaleDownSlotUtilizationPercent: {{ $a.scaleDownSlotUtilizationPercent }}
  {{- end }}
  {{- if $a.slotUpWindowSeconds }}
  slotUpWindowSeconds: {{ $a.slotUpWindowSeconds }}
  {{- end }}
  {{- if $a.slotDownWindowSeconds }}
  slotDownWindowSeconds: {{ $a.slotDownWindowSeconds }}
  {{- end }}
{{- end }}
{{- end }}
