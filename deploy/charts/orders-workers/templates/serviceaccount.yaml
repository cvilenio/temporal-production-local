# One dedicated KSA per worker profile, so each WorkerDeployment runs under its
# own least-privilege identity instead of the namespace `default` ServiceAccount.
# These workers talk only to the Temporal frontend (egress) — they never call the
# Kubernetes API — so the projected SA token is not mounted. That removes the only
# real blast-radius of a `default` SA: a token a compromised pod could replay
# against the API server (or, on real GKE, exchange via Workload Identity).
#
# Note: pod identity here is for k8s-side isolation only. Temporal Cloud auth is
# the API-key Secret on the Connection (ADR-0008) — NOT federated from this KSA.
# Workload Identity Federation is the prod-GKE overlay this local env deliberately
# omits; see ADR-0008 "Kubernetes pod identity".
{{- range .Values.workers }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .deploymentName }}
  labels:
    app.kubernetes.io/name: {{ .deploymentName }}
    app.kubernetes.io/component: worker
automountServiceAccountToken: false
{{- end }}
