apiVersion: v2
name: temporal-server
description: >-
  The self-hosted OSS Temporal backend for the kind cluster (ADR-0003). A thin
  wrapper around the official Temporal Server chart (go.temporal.io/helm-charts),
  vendored as a subchart dependency, plus the repo-specific pieces the upstream
  chart can't express: a CloudNativePG Postgres Cluster (persistence, matching the
  "one Postgres story" in ADR-0003), cert-manager Issuer + server/client
  Certificates for frontend mTLS (ADR-0008), and an Argo-managed bootstrap Job that
  registers the namespace + custom search attributes from the shared
  config/temporal/namespaces.yaml spec (ADR-0007) — the same spec Cloud Terraform
  reads, so the two backends can't drift.

  The subchart is resolved from the upstream CLASSIC Helm repo at `helm dependency
  build` time (publish runs on the host, which has network) and bundled into the
  packaged wrapper, so ArgoCD pulls one self-contained chart from the local OCI
  registry with no public-internet dependency at run time (air-gap contract,
  ADR-0013). Delivery is decoupled from the Cloud↔OSS toggle: this Application is
  created on first OSS bring-up and removed only by `just temporal-server-down`.
type: application
# 0.1.0: initial OSS-on-kind backend — official chart 1.5.0 (server 1.31.1) subchart,
#        CNPG persistence, frontend mTLS via cert-manager, bootstrap Job.
version: 0.1.5
appVersion: "1.31.1"
dependencies:
  - name: temporal
    # Kept in lockstep with config/dependencies.yaml charts.temporal.version
    # (versions-audit asserts this equals it). appVersion 1.31.1 == temporal.server.
    version: "1.5.0"
    repository: https://go.temporal.io/helm-charts
