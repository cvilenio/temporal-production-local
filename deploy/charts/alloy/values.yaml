# Grafana Alloy log-collection DaemonSet (ADR-0018 / ADR-0020). All values
# git-safe — no account-bearing data (the agent ships to the host backend, not
# Temporal Cloud).
namespace: observability

image:
  repository: grafana/alloy
  # v1.17.0: includes otelcol.receiver.filelog (public-preview) for OTel-native
  # collection. Run with --stability.level=public-preview (daemonset args).
  tag: v1.17.0

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

# The committed log pipeline (ADR-0020): Alloy builds an OTel LogRecord from each
# pod stdout line and ships it OTLP to the host-side OTel Collector, which writes
# to ClickHouse. The backend runs on the HOST, so kind pods reach it via the
# cluster's host gateway (host.docker.internal) — the "observability is a
# separate, durable tier the cluster ships OUT to" model (GKE → Cloud Logging).
clickhouse:
  # Namespace the collection is scoped to (the orders app), so the OTLP sending
  # queue isn't firehosed by the whole cluster's logs.
  scopeNamespace: "orders"
  # Host-side OTel Collector OTLP/HTTP listener (docker-compose.yml maps host
  # 4320 → container 4318). Base URL only — the exporter appends /v1/logs.
  otlpUrl: "http://host.docker.internal:4320"
