# Alloy pipeline config (River). The canonical k8s log-collection flow:
#   discover (via file path) ‚Üí tail pod stdout ‚Üí unwrap CRI + build an OTel
#   LogRecord ‚Üí ship OTLP to the host-side OTel Collector ‚Üí ClickHouse.
# This models the production k8s logging pattern (app‚Üístdout‚Üínode agent‚Üíbackend,
# the GKE fluentbit‚ÜíCloud Logging shape) and makes logs queryable BY WORKLOAD in
# Grafana via the OTel k8s resource attributes. ADR-0018 / ADR-0020.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: alloy
  annotations:
    # Must exist before the DaemonSet mounts it (existence dep; ADR-0016).
    argocd.argoproj.io/sync-wave: "0"
data:
  config.alloy: |
    // === OTel-native node-agent log collection ============================
    // Tails pod stdout and builds a REAL OTel LogRecord with the filelog
    // receiver ‚Äî the message/attributes split is produced HERE, by convention,
    // exactly like a Cloud Logging / Datadog agent. The agent (not the app)
    // holds the backend endpoint.
    //
    // Operator pipeline (stanza):
    //   container       ‚Äî unwrap the CRI/containerd envelope to the raw app JSON
    //                     AND add k8s.{namespace,pod,container} resource metadata
    //                     from the /var/log/pods/<ns>_<pod>_<uid>/... file path.
    //   json_parser     ‚Äî lift the obslog JSON into typed attributes.
    //   move            ‚Äî set Body = the `message` field (the source convention).
    //   severity_parser ‚Äî map `level` ‚Üí OTel SeverityText/Number.
    //   trace_parser    ‚Äî lift `trace_id` ‚Üí the record TraceId (log‚Üîtrace link;
    //                     our trace_id is a 32-hex id = a valid OTel trace id).
    // on_error=send_quiet + the move `if` guard keep foreign/non-JSON lines
    // (e.g. uvicorn access logs) flowing with Body = their raw line.
    // Scoped to the app namespace via the file-path glob; start_at=end ships only
    // new lines, so an agent restart doesn't re-flood the collector.
    otelcol.receiver.filelog "logs" {
      include  = ["/var/log/pods/{{ .Values.clickhouse.scopeNamespace }}_*/*/*.log"]
      start_at = "end"
      // The `container` operator's add_metadata_from_filepath needs the file path
      // on the record ‚Äî surface it (otherwise it errors per-entry).
      include_file_path = true

      operators = [
        { type = "container" },
        { type = "json_parser", parse_from = "body", parse_to = "attributes", on_error = "send_quiet" },
        { type = "move", from = "attributes.message", to = "body", if = "attributes.message != nil" },
        { type = "severity_parser", parse_from = "attributes.level", on_error = "send_quiet" },
        { type = "trace_parser", trace_id = { parse_from = "attributes.trace_id" }, on_error = "send_quiet" },
      ]

      output {
        logs = [otelcol.processor.batch.logs.input]
      }
    }

    otelcol.processor.batch "logs" {
      output {
        logs = [otelcol.exporter.otlphttp.logs.input]
      }
    }

    // Ship to the host-side OTel Collector (compose), which writes to ClickHouse
    // via the clickhouseexporter. Endpoint is the base URL; the exporter appends
    // /v1/logs. No auth ‚Äî the local collector's OTLP receiver is open on the
    // workbench network.
    otelcol.exporter.otlphttp "logs" {
      client {
        endpoint = env("CLICKHOUSE_OTLP_URL")
      }
      // Headroom for the order-burst + restart replay so the scoped stream is
      // buffered, not dropped, while the collector/ClickHouse commit.
      sending_queue {
        queue_size    = 10000
        num_consumers = 10
      }
    }
