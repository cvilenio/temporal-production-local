apiVersion: v2
name: alloy
description: >-
  Grafana Alloy as a node-level log-collection DaemonSet. Tails pod stdout from
  /var/log/pods, builds an OTel-native LogRecord (k8s resource metadata,
  message‚ÜíBody, level‚Üíseverity, trace_id‚ÜíTraceId), and ships it OTLP to the
  host-side OTel Collector, which writes to ClickHouse (ADR-0020). This models
  the production k8s logging pattern ‚Äî app‚Üístdout‚Üínode agent‚Üíbackend, the same
  shape as a GKE fluentbit DaemonSet ‚Üí Cloud Logging ‚Äî instead of apps pushing
  directly. The agent (not the app) holds the backend endpoint. ADR-0018.
type: application
