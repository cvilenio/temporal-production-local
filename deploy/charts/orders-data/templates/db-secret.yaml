# Pre-created credential for the orders-db owner role. CNPG adopts this via
# bootstrap.initdb.secret.name instead of generating a random password, so the
# host console (direct asyncpg pool) can use a known credential. Type must be
# kubernetes.io/basic-auth with `username` matching db.owner. Local-dev only.
#
# sync-wave -1: an EXISTENCE dependency of the Cluster (wave 0) — CNPG's initdb
# mounts it, so it must exist first or initdb fails `secret not found`. This is
# the legitimate use of sync-waves (order existence deps); see ADR-0016. The
# CI gate (deploy/lint-manifests.sh) enforces secret-before-consumer ordering.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.db.clusterName }}-app
  labels:
    app.kubernetes.io/name: orders-db
    app.kubernetes.io/component: db
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.db.owner | quote }}
  password: {{ .Values.db.password | quote }}
