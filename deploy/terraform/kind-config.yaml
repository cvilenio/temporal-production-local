# kind cluster for the demo platform.
# Port mappings expose the in-cluster Temporal frontend (gRPC) and the OTLP
# receiver on the host so local SDK clients / the CLI can connect without a
# tunnel. Adapted from alexandreroman/temporal-k8s (Apache-2.0).
#
# Lifecycle is CLI-owned (deploy/kind/cluster-up.sh, driven by `just cluster-up`),
# not the Terraform kind provider — so the kubernetes/helm providers in
# layers/cluster read a real kubeconfig instead of depending on a not-yet-created
# resource. See docs/adr (cluster seam) and ai_checkpoints.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Let containerd resolve per-registry hosts from /etc/containerd/certs.d; the
# cluster-up script drops a hosts.toml there pointing localhost:5001 at the
# local registry container (kind+registry recipe).
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    extraPortMappings:
      # HTTP / HTTPS ingress (ArgoCD UI, Temporal Web, Grafana via ingress)
      - { containerPort: 30080, hostPort: 80,   protocol: TCP }
      - { containerPort: 30443, hostPort: 443,  protocol: TCP }
      # Temporal frontend gRPC (NodePort/Gateway → host 7233)
      - { containerPort: 30723, hostPort: 7233, protocol: TCP }
      # NOTE: removed the old `hostPort 4318 → kind` mapping. The OTLP/log flow is
      # now AGENT-OUT, not inbound: the in-cluster Alloy DaemonSet ships logs to
      # the host-side lgtm (which publishes 3100/4317/4318 in docker-compose.yml)
      # via host.docker.internal. Keeping host:4318 free lets lgtm bind it.
      # See ADR-0018.
      # ArgoCD server HTTP (NodePort 30808 → host 8090). The host-plane
      # viz-proxy fronts this and strips frame headers so the console can
      # iframe it; the raw host port stays reachable for `open in new tab`.
      # See ADR-0014 (local visibility plane).
      - { containerPort: 30808, hostPort: 8090, protocol: TCP }
      # App tier now runs on kind (ai_checkpoints/0011). The still-on-host console
      # (and the order E2E curl) reach it through these NodePort → host maps,
      # reusing the host ports the Compose orders-service/orders-db used to publish:
      #   orders-api  (orders-service NodePort 30800) → host 8002
      #   orders-db   (CNPG -rw NodePort      30543) → host 5433  (console asyncpg pool)
      - { containerPort: 30800, hostPort: 8002, protocol: TCP }
      - { containerPort: 30543, hostPort: 5433, protocol: TCP }
  - role: worker
  - role: worker
# Pod → host egress: the orders workers reach the host mock-api at
# host.docker.internal:8001 (MOCK_API_URL in the orders-workers chart). On Docker
# Desktop this name resolves from pods because kind's CoreDNS forwards external
# names to the node resolver, which Docker Desktop populates. If a future runtime
# (rootless/Linux Docker) can't resolve it, patch CoreDNS with a `hosts` entry
# mapping host.docker.internal → the docker host-gateway IP. Validated by the
# order E2E (an activity must reach mock-api).
