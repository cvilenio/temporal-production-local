# kind cluster for the demo platform.
# Port mappings expose the in-cluster Temporal frontend (gRPC) and the OTLP
# receiver on the host so local SDK clients / the CLI can connect without a
# tunnel. Adapted from alexandreroman/temporal-k8s (Apache-2.0).
#
# Lifecycle is CLI-owned (deploy/kind/cluster-up.sh, driven by `just cluster-up`),
# not the Terraform kind provider — so the kubernetes/helm providers in
# layers/cluster read a real kubeconfig instead of depending on a not-yet-created
# resource. See docs/adr (cluster seam) and ai_checkpoints.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Let containerd resolve per-registry hosts from /etc/containerd/certs.d; the
# cluster-up script drops a hosts.toml there pointing localhost:5001 at the
# local registry container (kind+registry recipe).
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    extraPortMappings:
      # HTTP / HTTPS ingress (ArgoCD UI, Temporal Web, Grafana via ingress)
      - { containerPort: 30080, hostPort: 80,   protocol: TCP }
      - { containerPort: 30443, hostPort: 443,  protocol: TCP }
      # Temporal frontend gRPC (NodePort/Gateway → host 7233)
      - { containerPort: 30723, hostPort: 7233, protocol: TCP }
      # OTLP gRPC/HTTP receiver (host 4318 → collector)
      - { containerPort: 30418, hostPort: 4318, protocol: TCP }
      # ArgoCD server HTTP (NodePort 30808 → host 8090). The host-plane
      # viz-proxy fronts this and strips frame headers so the console can
      # iframe it; the raw host port stays reachable for `open in new tab`.
      # See ADR-0014 (local visibility plane).
      - { containerPort: 30808, hostPort: 8090, protocol: TCP }
  - role: worker
  - role: worker
