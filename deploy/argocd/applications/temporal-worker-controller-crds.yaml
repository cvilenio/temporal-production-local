# Temporal Worker Controller CRDs (Connection, WorkerDeployment — temporal.io/v1alpha1).
# Installed as a SEPARATE chart from the controller so CRD lifecycle never churns
# on controller upgrades (the upstream split). The chart version is the single source
# of truth in config/dependencies.yaml (charts.temporal-worker-controller-crds) and is
# injected as targetRevision by the cluster TF layer — not pinned in this file. Stay on
# a GA line that supports apiKeySecretRef (never 1.1.0/1.2.0). OCI Helm chart on Docker Hub.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal-worker-controller-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    # Local OCI mirror (deploy/kind/mirror-deps.sh) — no public-internet pull.
    # targetRevision is injected by the cluster layer from config/dependencies.yaml.
    repoURL: registry-tls.kube-public.svc:5000/charts
    chart: temporal-worker-controller-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: temporal-system
  syncPolicy:
    automated:
      prune: false # never auto-prune CRDs
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # CRDs can exceed the client-side annotation size limit
