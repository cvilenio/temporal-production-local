# Temporal Worker Controller — reconciles Connection/WorkerDeployment CRs into
# versioned worker Deployments (Build-ID rainbow deploys). The chart version is the
# single source of truth in config/dependencies.yaml (charts.temporal-worker-controller)
# and is injected as targetRevision by the cluster TF layer — not pinned in this file.
# cert-manager is a soft dependency for the webhook: we let
# cert-manager land via its own Application (wave -2) and only have the controller
# create its Issuer/Certificate (certmanager.enabled), not install cert-manager
# itself (certmanager.install=false). sync-wave -1: after CRDs + cert-manager,
# before the orders workload (wave 0).
#
# workerResourceTemplate.allowedResources gates which kinds a WorkerResourceTemplate
# may embed AND drives the controller's ClusterRole RBAC for them. We add KEDA's
# ScaledObject (keda.sh) alongside the default HPA so the orders-workers chart can
# attach a per-version KEDA ScaledObject through the WRT seam (ADR-0023 Phase 1).
# The WRT validating webhook additionally runs a SubjectAccessReview on the applying
# identity (the ArgoCD app-controller SA, cluster-admin here) and the controller SA.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal-worker-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    # Local OCI mirror (deploy/kind/mirror-deps.sh) — no public-internet pull.
    # targetRevision is injected by the cluster layer from config/dependencies.yaml.
    repoURL: registry-tls.kube-public.svc:5000/charts
    chart: temporal-worker-controller
    helm:
      valuesObject:
        certmanager:
          install: false # cert-manager comes from its own Application
          enabled: true # but DO create the webhook Issuer + Certificate
        workerResourceTemplate:
          allowedResources:
            - kinds: ["HorizontalPodAutoscaler"] # chart default — keep it
              apiGroups: ["autoscaling"]
              resources: ["horizontalpodautoscalers"]
            - kinds: ["ScaledObject"] # KEDA — the autoscaler we actually attach
              apiGroups: ["keda.sh"]
              resources: ["scaledobjects"]
  destination:
    server: https://kubernetes.default.svc
    namespace: temporal-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
