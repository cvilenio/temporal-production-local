# In-cluster Prometheus — the metrics-phase scrape + rule + remote_write engine
# (ADR-0021). It scrapes the SDK :9000 endpoints (pod-annotation discovery, the
# chart's default kubernetes-pods job) and the Temporal Cloud OpenMetrics endpoint,
# evaluates the slot_utilization recording rule that KEDA's Prometheus scaler
# queries (ADR-0023), and remote_writes everything to the HOST metrics store — the
# "persist outside the cluster" tier, mirroring the Alloy->ClickHouse log path
# (ADR-0020). Local retention is a short hot buffer only; durability lives on the
# host. No NodePort: KEDA + the recording rules read it over cluster DNS, and
# Grafana reads the host store, so nothing off-cluster talks to this instance.
#
# Secret-free, so it rides the committed-addon glob (targetRevision injected by the
# cluster layer from config/dependencies.yaml). The Temporal Cloud API key is NOT
# in this manifest: the `cloud-metrics-apikey` Secret is created out-of-git by the
# cluster layer (deploy/terraform/layers/cluster/observability.tf), mounted by file,
# and the scrape job references the path — never an inline token. The key is minted
# by the cloud layer's Metrics Read-Only (metricsread) service account
# (deploy/terraform/layers/cloud/metrics-reader.tf, provider >= 1.x) and handed to
# the cluster layer via remote state. Out-of-band minting (tcld --account-role
# MetricsRead → TF_VAR_cloud_metrics_apikey) remains a fallback.
#
# sync-wave -2: lands with the other base add-ons, before the wave-0 workloads it
# scrapes start producing metrics.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    # Local OCI mirror (deploy/kind/mirror-deps.sh) — no public-internet pull.
    # targetRevision is injected by the cluster layer from config/dependencies.yaml.
    repoURL: registry-tls.kube-public.svc:5000/charts
    chart: prometheus
    helm:
      valuesObject:
        # Lean: a scrape+rule+remote_write engine, not a monitoring stack. Drop the
        # subcharts we don't use on kind (the host store + Grafana own viz/alerting).
        alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        server:
          # Short hot buffer only — the host store is the durable tier (remoteWrite).
          retention: "2h"
          remoteWrite:
            # Host metrics store (docker-compose prometheus-store, remote-write
            # receiver on :9009). kind pods reach the host via the cluster's host
            # gateway, exactly like Alloy ships logs to host.docker.internal:4320.
            - url: http://host.docker.internal:9009/api/v1/write
          extraSecretMounts:
            # Temporal Cloud OpenMetrics bearer token (key `api-key`), created by the
            # cluster layer in this namespace. Mounted read-only as a file so the
            # token never appears in this committed manifest.
            - name: cloud-metrics-apikey
              secretName: cloud-metrics-apikey
              mountPath: /etc/secrets/cloud
              readOnly: true
        # Appended to the chart's default scrape_configs (which already include the
        # kubernetes-pods job honoring prometheus.io/scrape|port|path annotations —
        # that job scrapes the worker + orders-api :9000 SDK endpoints).
        extraScrapeConfigs: |
          - job_name: temporal-cloud
            scheme: https
            metrics_path: /v1/metrics
            # v1 metrics are pre-computed per-second rates published ~3min late and
            # once per minute. Honor the response timestamps; NEVER rate() these.
            honor_timestamps: true
            scrape_interval: 30s        # 180 req/hr account cap -> 30s; >60s skips windows
            scrape_timeout: 10s
            authorization:
              type: Bearer
              credentials_file: /etc/secrets/cloud/api-key
            static_configs:
              - targets: ['metrics.temporal.io']
            # If the response approaches the 30k-datapoint cap, filter at scrape time:
            # params:
            #   namespaces: ['ziggymart-*']
        serverFiles:
          recording_rules.yml:
            groups:
              - name: temporal-worker
                rules:
                  # slot_utilization is NOT an SDK metric — it is a recording rule over
                  # the slot gauges the Core SDK emits (ADR-0021), consumed by KEDA's
                  # Prometheus scaler (ADR-0023).
                  #
                  # Name + shape deliberately track the temporal-worker-controller's
                  # upstream reference (its prometheus-stack-values.yaml / KEDA + HPA
                  # examples all query `temporal_slot_utilization`) so those examples
                  # apply to us verbatim — underscore, not the colon recording-rule
                  # convention.
                  #
                  # Grouped by the version-stable, SDK-native labels (namespace /
                  # worker_type / task_queue) on purpose — NOT by build_id. This rule is
                  # for dashboards/alerting and a future per-version safe-to-zero guard,
                  # and grouping by the scrape-relabel labels (temporal_io_build_id /
                  # temporal_io_deployment_name) would couple it to our scrape wiring.
                  #
                  # NOTE (corrected): per-version identity IS available today — the worker
                  # pods carry temporal.io/build-id + temporal.io/deployment-name (set by
                  # the Worker Controller), surfaced onto every series by the kubernetes-pods
                  # scrape as temporal_io_build_id / temporal_io_deployment_name. So a
                  # per-version slot_utilization rule needs NO SDK bump (temporalio 1.29 is
                  # latest stable). It is simply not needed for per-version SCALING: that runs
                  # on the KEDA Temporal scaler (DescribeWorkerDeploymentVersion, per Build ID
                  # injected by the controller), which does not consume this rule at all
                  # (ADR-0023). task_queue still maps 1:1 to a WorkerDeployment here.
                  #
                  # Aggregate the two gauges separately before dividing — adding the raw
                  # vectors fails to match on their differing __name__.
                  - record: temporal_slot_utilization
                    expr: |
                      sum by (namespace, worker_type, task_queue) (temporal_worker_task_slots_used)
                      /
                      clamp_min(
                        sum by (namespace, worker_type, task_queue) (temporal_worker_task_slots_used)
                        + sum by (namespace, worker_type, task_queue) (temporal_worker_task_slots_available),
                        1
                      )
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
