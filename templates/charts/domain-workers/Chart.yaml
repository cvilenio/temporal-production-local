apiVersion: v2
name: {{DOMAIN}}-workers
description: >-
  Versioned domain worker fleet, delivered as Temporal Worker Controller CRDs
  (WorkerDeployment + Connection). One WorkerDeployment per worker profile
  (workflow, activity, …). Build ID is derived from the pod-template hash, so
  shipping a new version is just a new image tag. See ADR-0004.
type: application
# 0.1.21: generic downstreamServices env + exec-probe wiring; extraEnv; httpGet
# startupProbe; slot scale-up/down gate wiring on WorkerAutoscaler.
# 0.1.22: nest autoscaling under workers[] - derive taskQueue/queueType from worker fields.
# Keep in lockstep with cluster TF <domain>_workers_chart_version.
version: 0.1.22
appVersion: "1.0"
# Requires the Temporal Worker Controller installed in-cluster (CRDs:
# temporal.io/v1alpha1). Installed via Terraform/ArgoCD; depends on cert-manager.
