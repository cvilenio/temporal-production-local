<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Demo Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bgMain: '#0b0d14',
                        bgPanel: '#11141d',
                        borderSubtle: '#1f2430',
                        accent: '#7c5cff',
                        accentHover: '#8b6eff',
                        textPrimary: '#e6e8ef',
                        textMuted: '#8a90a2',
                        success: '#3ecf8e',
                        error: '#ff6b6b',
                        warn: '#f0b429',
                        info: '#6aa9ff'
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/app.css">
    
    <style>
        body { font-family: Inter, -apple-system, system-ui, sans-serif; letter-spacing: -0.01em; }
    </style>
</head>
<body class="bg-bgMain text-textPrimary h-screen flex overflow-hidden">
    <!-- Left Nav Rail -->
    <nav class="w-14 shrink-0 bg-bgPanel border-r border-borderSubtle flex flex-col items-center py-4 space-y-6 relative">
        <div class="text-accent mb-4 relative">
            <div class="absolute inset-0 bg-accent/20 blur-md rounded-full"></div>
            <!-- App Logo (Storefront/Retail) — Lucide "store" -->
            <svg class="w-6 h-6 relative" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5" />
                <path d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244" />
                <path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05" />
            </svg>
        </div>
        
        <a href="/architecture" title="Architecture" class="relative group p-2 rounded-md transition-colors {% if active == 'architecture' %}text-accent{% else %}text-textMuted hover:text-textPrimary{% endif %}">
            {% if active == 'architecture' %}<div class="absolute left-[-16px] top-1/2 transform -translate-y-1/2 h-8 w-[3px] bg-accent rounded-r-full"></div>{% endif %}
            <!-- Docker Whale Icon — Simple-Icons "docker" -->
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M13.983 11.078h2.119a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186h-2.119a.185.185 0 00-.185.185v1.888c0 .102.083.185.185.185m-2.954-5.43h2.118a.186.186 0 00.186-.186V3.574a.186.186 0 00-.186-.185h-2.118a.185.185 0 00-.185.185v1.888c0 .102.082.185.185.185m0 2.716h2.118a.187.187 0 00.186-.186V6.29a.186.186 0 00-.186-.185h-2.118a.185.185 0 00-.185.185v1.887c0 .102.082.185.185.186m-2.93 0h2.12a.186.186 0 00.184-.186V6.29a.185.185 0 00-.185-.185H8.1a.185.185 0 00-.185.185v1.887c0 .102.083.185.185.186m-2.964 0h2.119a.186.186 0 00.185-.186V6.29a.185.185 0 00-.185-.185H5.136a.186.186 0 00-.186.185v1.887c0 .102.084.185.186.186m5.893 2.715h2.118a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186h-2.118a.185.185 0 00-.185.185v1.888c0 .102.082.185.185.185m-2.93 0h2.12a.185.185 0 00.184-.185V9.006a.185.185 0 00-.184-.186h-2.12a.185.185 0 00-.184.185v1.888c0 .102.083.185.185.185m-2.964 0h2.119a.185.185 0 00.185-.185V9.006a.185.185 0 00-.184-.186h-2.12a.186.186 0 00-.186.186v1.887c0 .102.084.185.186.185m-2.92 0h2.12a.185.185 0 00.184-.185V9.006a.185.185 0 00-.184-.186h-2.12a.185.185 0 00-.184.185v1.888c0 .102.082.185.185.185M23.763 9.89c-.065-.051-.672-.51-1.954-.51-.338.001-.676.03-1.01.087-.248-1.7-1.653-2.53-1.716-2.566l-.344-.199-.226.327c-.284.438-.49.922-.612 1.43-.23.97-.09 1.882.403 2.661-.595.332-1.55.413-1.744.42H.751a.751.751 0 00-.75.748 11.376 11.376 0 00.692 4.062c.545 1.428 1.355 2.48 2.41 3.124 1.18.723 3.1 1.137 5.275 1.137.983.003 1.963-.086 2.93-.266a12.248 12.248 0 003.823-1.389c.98-.567 1.86-1.288 2.61-2.136 1.252-1.418 1.998-2.997 2.553-4.4h.221c1.372 0 2.215-.549 2.68-1.009.309-.293.55-.65.707-1.046l.098-.288Z"/>
            </svg>
        </a>

        <a href="/orders" title="Orders" class="relative group p-2 rounded-md transition-colors {% if active == 'orders' %}text-accent{% else %}text-textMuted hover:text-textPrimary{% endif %}">
            {% if active == 'orders' %}<div class="absolute left-[-16px] top-1/2 transform -translate-y-1/2 h-8 w-[3px] bg-accent rounded-r-full"></div>{% endif %}
            <!-- Cart Icon — Lucide "shopping-cart" -->
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="8" cy="21" r="1" />
                <circle cx="19" cy="21" r="1" />
                <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
            </svg>
        </a>
        
        <a href="/tracking" title="Tracking" class="relative group p-2 rounded-md transition-colors {% if active == 'tracking' %}text-accent{% else %}text-textMuted hover:text-textPrimary{% endif %}">
            {% if active == 'tracking' %}<div class="absolute left-[-16px] top-1/2 transform -translate-y-1/2 h-8 w-[3px] bg-accent rounded-r-full"></div>{% endif %}
            <!-- Package/Box Icon — Lucide "package" -->
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z" />
                <path d="M12 22V12" />
                <polyline points="3.29 7 12 12 20.71 7" />
                <path d="m7.5 4.27 9 5.15" />
            </svg>
        </a>
    </nav>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Top Bar -->
        <header class="h-14 border-b border-borderSubtle bg-bgPanel flex items-center justify-between px-6 shrink-0">
            <h1 class="text-lg font-semibold text-textPrimary tracking-tight">Retail Demo Console</h1>
            <div class="px-3 py-1 rounded-full bg-borderSubtle/30 text-textMuted text-xs font-mono tracking-wider flex items-center border border-borderSubtle/50 shadow-inner" x-data="{ time: new Date().toISOString().substr(11, 8) }" x-init="setInterval(() => time = new Date().toISOString().substr(11, 8), 1000)">
                <span x-text="time"></span> <span class="ml-1 opacity-70">UTC</span>
            </div>
        </header>
        
        <!-- View Content -->
        <main class="flex-1 overflow-hidden">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Relative Time Helper for global usage -->
    <script>
        window.relativeTime = function(isoDateString) {
            if (!isoDateString) return "";
            const d = new Date(isoDateString);
            const now = new Date();
            const diffMs = now - d;
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 1) return "Just now";
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours}h ago`;
            const diffDays = Math.floor(diffHours / 24);
            return `${diffDays}d ago`;
        };
    </script>
</body>
</html>
