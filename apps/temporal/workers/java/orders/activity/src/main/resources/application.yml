spring:
  application:
    name: orders-finalization-java-worker
  config:
    import: optional:classpath:application-appkit.yaml
  temporal:
    namespace: ${TEMPORAL_NAMESPACE}
    connection:
      target: ${TEMPORAL_ADDRESS:localhost:7233}
    start-workers: true
    workers-auto-discovery:
      # SDK 1.35+ requires explicit activity-bean registration (legacy `packages` still
      # works but is deprecated). This worker hosts @ActivityImpl beans only.
      register-activity-beans: true
    workers:
      - task-queue: orders-finalization-task-queue

temporal:
  data-converter: ${TEMPORAL_DATA_CONVERTER:default}

appkit:
  worker:
    default-deployment-name: orders-finalization-java
  telemetry:
    otel-service-name: ${OTEL_SERVICE_NAME:orders-worker-finalization-java}

orders:
  service-url: ${ORDERS_SERVICE_URL:http://localhost:8002}

management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,ordersService

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    io.temporal: INFO
