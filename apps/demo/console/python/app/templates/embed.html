{% extends "base.html" %}
{% block content %}

<div class="h-full w-full flex flex-col" x-data="{ spinning: false }">
  <!-- Thin toolbar: label + refresh + open-in-new-tab fallback (iframes can be finicky) -->
  <div class="h-9 shrink-0 flex items-center justify-between px-4 border-b border-borderSubtle bg-bgPanel/60">
    <span class="text-xs uppercase tracking-wider text-textMuted font-semibold">{{ title }}</span>
    <div class="flex items-center gap-4">
      <button type="button"
              title="Refresh"
              @click="spinning = true; const f = $refs.frame; f.src = f.src; setTimeout(() => spinning = false, 600)"
              class="text-xs text-textMuted hover:text-accent flex items-center gap-1 transition-colors">
        Refresh
        <!-- Lucide "rotate-cw" -->
        <svg class="w-3.5 h-3.5 transition-transform" :class="spinning && 'animate-spin'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 12a9 9 0 1 1-3-6.74L21 8" />
          <path d="M21 3v5h-5" />
        </svg>
      </button>
      <a href="{{ embed_url }}" target="_blank" rel="noopener noreferrer"
         class="text-xs text-textMuted hover:text-accent flex items-center gap-1 transition-colors">
        Open in new tab
        <!-- Lucide "external-link" -->
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M15 3h6v6" />
          <path d="M10 14 21 3" />
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        </svg>
      </a>
    </div>
  </div>

  <iframe
    x-ref="frame"
    src="{{ embed_url }}"
    title="{{ title }}"
    class="flex-1 w-full border-0 bg-white"
    referrerpolicy="no-referrer"></iframe>
</div>

{% endblock %}
