---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: temporal-worker-autoscaler
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments/scale
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - autoscaling.ziggymart.io
  resources:
  - workerautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling.ziggymart.io
  resources:
  - workerautoscalers/finalizers
  verbs:
  - update
- apiGroups:
  - autoscaling.ziggymart.io
  resources:
  - workerautoscalers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - temporal.io
  resources:
  - workerdeployments
  verbs:
  - get
  - list
  - watch
