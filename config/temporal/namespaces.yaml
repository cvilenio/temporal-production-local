# =============================================================================
# Temporal platform spec — single source of truth for namespace identity,
# custom search attributes, and retention.
#
# Backend-agnostic ON PURPOSE. Both backends read THIS file so they cannot drift:
#   - Temporal Cloud : deploy/terraform/layers/cloud reads it via yamldecode()
#     and maps each domain to a `<domain>` Cloud namespace, merging a small
#     Cloud-only overlay (service account, API key, regions) on top.
#   - Local OSS      : compose/scripts/render-oss-bootstrap.py renders it to a
#     shell-friendly file that the bootstrap container loops over (no yq/jq in
#     the admin-tools image). On kind this same file feeds an Argo-managed Job.
#
# The Cloud/OSS provisioning *mechanisms* differ by necessity (Cloud namespaces
# are control-plane SaaS objects; OSS namespaces live in the running frontend) —
# see ADR-0007. This spec keeps the *config* identical regardless.
#
# One namespace per DOMAIN, no environment axis (ADR-0017 / checkpoint 0015): the
# repo models a single production-shaped environment. Cloud and OSS now use the
# SAME bare `<domain>` name. Multi-tenancy/feature axes that DO matter live
# elsewhere — domain (a new top-level key here → Nexus) and region (per-domain
# `regions` in the Cloud overlay → multi-region HA), not environment.
# =============================================================================

domains:
  ziggymart:
    # Production-shaped retention. (Nonprod/prod is retired — see ADR-0017.)
    retention_days: 30
    # Orders workload's custom search attributes (OrderWorkflow upserts these).
    search_attributes:
      OrderId: Text
      TraceId: Text
      OrderStatus: Keyword
      # Activity contract versions with live traffic (ADR-0021): retire an old
      # contract by query, e.g. ContractVersions in ("1") AND ExecutionStatus="Running".
      ContractVersions: KeywordList
