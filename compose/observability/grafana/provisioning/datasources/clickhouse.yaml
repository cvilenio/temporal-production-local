# ClickHouse datasource for Grafana — the high-fidelity warehouse (ADR-0020/0024).
# ONE ClickHouse server / `default` database, two signals, both queried in SQL:
#   • logs            → otel_logs       (Alloy → collector, ADR-0020)
#   • business metrics → otel_metrics_*  (apps business_meter() push, ADR-0024)
# So this single datasource backs BOTH the logs dashboards and the business-metrics
# panels — the `logs:` block below only sets the Logs-builder defaults (otel_logs);
# raw-SQL panels query any table (e.g. otel_metrics_sum). uid stays `clickhouse-logs`
# (dashboards reference it by uid; renaming the display name is safe). Use this for
# business/analytical metrics + logs; use a Prometheus datasource for operational /
# autoscaling / PromQL metrics. Reachable lgtm→clickhouse over temporal-network.
apiVersion: 1
# Drop the pre-rename entry first. This datasource was once named "ClickHouse (logs)"
# on the SAME uid (clickhouse-logs). Grafana provisioning matches by name, so a rename
# alone makes it try to INSERT the new name on an already-used uid → "data source with
# the same uid already exists", which aborts Grafana startup on any volume that still
# holds the old row. Deleting the old name by uid first makes the rename idempotent;
# once it's gone this is a harmless no-op.
deleteDatasources:
  - name: ClickHouse (logs)
    orgId: 1
datasources:
  - name: ClickHouse (logs + metrics)
    type: grafana-clickhouse-datasource
    uid: clickhouse-logs
    access: proxy
    editable: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: default
      logs:
        defaultDatabase: default
        defaultTable: otel_logs
        otelEnabled: true
        # Pin the columns explicitly instead of an otelVersion preset: it's
        # version-independent (no dependence on which preset matches the exporter's
        # schema) and avoids the plugin's "schema may differ" banner. The contrib
        # clickhouseexporter schema carries both `Timestamp` (DateTime64(9)) and
        # `TimestampTime` (DateTime); filter on `Timestamp` for full precision.
        timeColumn: Timestamp
        filterTimeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
        # THE FIX for "only body, no context fields": the default logs query
        # selects only time/body/level. Pull the OTel attribute maps in as
        # context columns so order_id/trace_id/step/workflow_id/etc. render as
        # expandable log fields (the plugin flattens these Map columns to fields).
        selectContextColumns: true
        contextColumns:
          - LogAttributes
          - ResourceAttributes
      # Ready for when tracing lands (traces shipped to ClickHouse); harmless until then.
      traces:
        defaultDatabase: default
        defaultTable: otel_traces
        otelEnabled: true
    secureJsonData:
      # Committed workbench constant — matches docker-compose.yml CLICKHOUSE_PASSWORD.
      password: ziggymart-local-clickhouse
