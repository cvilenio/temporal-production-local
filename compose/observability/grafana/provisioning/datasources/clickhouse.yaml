# ClickHouse logs datasource for Grafana — the committed log store (ADR-0020).
# Grafana is the single viz pane; ClickHouse is the schema-on-read log store
# (full fidelity, no field mapping) that replaced Loki. The OTel Collector writes
# the standard `otel_logs` schema (clickhouseexporter); otelEnabled=true → the
# plugin reads the OTel columns (Timestamp, Body, SeverityText, TraceId,
# LogAttributes, ResourceAttributes). Body is already the message (Alloy filelog
# `move`), so the log view is clean. SQL, not LogQL. Reachable lgtm→clickhouse
# over temporal-network.
apiVersion: 1
datasources:
  - name: ClickHouse (logs)
    type: grafana-clickhouse-datasource
    uid: clickhouse-logs
    access: proxy
    editable: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: default
      logs:
        defaultDatabase: default
        defaultTable: otel_logs
        otelEnabled: true
        # Pin the columns explicitly instead of an otelVersion preset: it's
        # version-independent (no dependence on which preset matches the exporter's
        # schema) and avoids the plugin's "schema may differ" banner. The contrib
        # clickhouseexporter schema carries both `Timestamp` (DateTime64(9)) and
        # `TimestampTime` (DateTime); filter on `Timestamp` for full precision.
        timeColumn: Timestamp
        filterTimeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
        # THE FIX for "only body, no context fields": the default logs query
        # selects only time/body/level. Pull the OTel attribute maps in as
        # context columns so order_id/trace_id/step/workflow_id/etc. render as
        # expandable log fields (the plugin flattens these Map columns to fields).
        selectContextColumns: true
        contextColumns:
          - LogAttributes
          - ResourceAttributes
      # Ready for when tracing lands (traces shipped to ClickHouse); harmless until then.
      traces:
        defaultDatabase: default
        defaultTable: otel_traces
        otelEnabled: true
    secureJsonData:
      # Committed workbench constant — matches docker-compose.yml CLICKHOUSE_PASSWORD.
      password: ziggymart-local-clickhouse
