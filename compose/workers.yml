# =============================================================================
# Temporal worker tier — host-plane LAYER for docker-compose.yml
# =============================================================================
#
# The two orders workers (workflow + activity). Split out of the base so the
# base file is the host *platform/visibility plane* (app services + console +
# observability + cluster observers) and the workers are an opt-in layer.
#
# Why a layer: on the kind paths the workers run *in the cluster* (the
# orders-workers Helm chart / Worker Controller). Running them here too would
# put TWO fleets on the same task queues. So:
#
#   Compose-OSS    : base + compose/workers.yml + compose/oss-server.yml   (poe up)
#   Compose→Cloud  : base + compose/workers.yml                            (poe up-cloud)
#   kind + Cloud   : base ONLY  (poe up-cloud-kind) — kind owns the workers
#
# Network/volume definitions come from the base file — never run this alone.
# The OSS layer (compose/oss-server.yml) merges `depends_on: temporal` onto
# these services, so when present it must come AFTER this file in the -f order.
# =============================================================================

services:

  # orders-workflow-worker  polls orders-workflow-task-queue → hosts OrderWorkflow
  # orders-activity-worker  polls orders-activity-task-queue → hosts activities
  # Same image; the entrypoint dir selects the role. Temporal backend via env.

  orders-workflow-worker:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: workers
        APP_PATH: apps/temporal/workers/python/workflow
        APP_MODULE: main
        APP_CMD: python
    container_name: orders-workflow-worker
    command: ["python", "main.py"]
    depends_on:
      orders-db:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      mock-api:
        condition: service_started
      lgtm:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-ziggymart}
      - TEMPORAL_TLS=${TEMPORAL_TLS:-false}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://admin:password@orders-db:5432/orders_db
      - MOCK_API_URL=http://mock-api:8000
      - ORDERS_SERVICE_URL=http://orders-service:8000
      - PYTHONUNBUFFERED=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_SERVICE_NAME=orders-workflow-worker
      - SDK_METRICS_PORT=9000
    networks:
      - temporal-network

  orders-activity-worker:
    build:
      context: .
      dockerfile: images/python.Dockerfile
      args:
        APP_GROUP: workers
        APP_PATH: apps/temporal/workers/python/activity
        APP_MODULE: main
        APP_CMD: python
    container_name: orders-activity-worker
    command: ["python", "main.py"]
    depends_on:
      orders-db:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      mock-api:
        condition: service_started
      lgtm:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-ziggymart}
      - TEMPORAL_TLS=${TEMPORAL_TLS:-false}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://admin:password@orders-db:5432/orders_db
      - MOCK_API_URL=http://mock-api:8000
      - ORDERS_SERVICE_URL=http://orders-service:8000
      - PYTHONUNBUFFERED=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_SERVICE_NAME=orders-activity-worker
      - SDK_METRICS_PORT=9000
    networks:
      - temporal-network
