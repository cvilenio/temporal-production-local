user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Headlamp ships a ~6 MB JS bundle uncompressed; gzip it so the browser
    # isn't pulling ~7.7 MB on every (re)load of the iframe.
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript text/javascript
                    application/json image/svg+xml application/manifest+json;

    # Big upstream buffers so large assets stream straight through instead of
    # being spooled to temp files (the default 32 KB buffers stall on 6 MB).
    proxy_buffer_size       64k;
    proxy_buffers           16 64k;
    proxy_busy_buffers_size 128k;

    # WebSocket upgrade plumbing — Headlamp (logs/exec) and the ArgoCD UI both
    # stream over WebSockets, so the proxied connection must be upgradable.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------------------------------------------------------------------------
    # Headlamp — the host-side K8s explorer. Runs as a Compose service on the
    # shared network, so we reach it by name. Stripping the frame headers lets the
    # demo console iframe it (same trick as the OSS Temporal-UI proxy). ADR-0014.
    # ---------------------------------------------------------------------------
    server {
        listen 8087;
        server_name localhost;

        # Hashed, content-addressed bundles — cache hard so reopening the tab
        # doesn't re-download + re-parse 6 MB of JS every time.
        location /assets/ {
            resolver 127.0.0.11 ipv6=off;
            set $headlamp_upstream "headlamp:4466";
            proxy_pass http://$headlamp_upstream;
            proxy_set_header Host $host;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            # Variable upstream + Docker's embedded DNS so nginx boots even if the
            # Headlamp container isn't resolvable yet (it 502s per-request instead).
            resolver 127.0.0.11 ipv6=off;
            set $headlamp_upstream "headlamp:4466";
            proxy_pass http://$headlamp_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors http://localhost:8086;";
        }
    }

    # ---------------------------------------------------------------------------
    # ArgoCD UI — lives IN the kind cluster (it is a cluster component, ADR-0014).
    # kind maps argocd-server's NodePort to host :8090; we can't reach that from
    # the Compose network directly, so we hop via host.docker.internal. When the
    # cluster is down this upstream is unreachable and the tab shows a 502 — the
    # intended "dark when the cluster is stopped" behavior, not a defect.
    # ---------------------------------------------------------------------------
    server {
        listen 8088;
        server_name localhost;

        location / {
            # Resolver + variable upstream so nginx starts even when the cluster
            # (and thus this host) isn't answering yet — it 502s per-request
            # instead of refusing to boot.
            resolver 127.0.0.11 ipv6=off;
            set $argocd_upstream "host.docker.internal:8090";
            proxy_pass http://$argocd_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors http://localhost:8086;";
        }
    }

    # ---------------------------------------------------------------------------
    # Temporal Web UI — the OSS backend's console (ADR-0003), running IN the kind
    # cluster (temporal-web). kind maps its NodePort to host :8091; we hop via
    # host.docker.internal and strip the frame headers so the demo console can iframe
    # it (TEMPORAL_UI_EMBED_URL=http://localhost:8089). Dark on the Cloud backend
    # (no temporal-web) — a 502 there, the intended behavior. Mirrors ArgoCD above.
    # ---------------------------------------------------------------------------
    server {
        listen 8089;
        server_name localhost;

        location / {
            resolver 127.0.0.11 ipv6=off;
            set $temporal_web_upstream "host.docker.internal:8091";
            proxy_pass http://$temporal_web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors http://localhost:8086;";
        }
    }
}
